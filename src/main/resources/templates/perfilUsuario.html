<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="fragments :: head (titulo='Perfil de Usuario')"></head>
    <body>

        <nav th:replace="~{fragments::menu(${usuario})}"></nav>
        <div class="container-fluid">

            <div class="row mt-3">
                <div class="col">
                    <h2 th:text="'Perfil de ' + ${usuarioDescripcion.nombre}"></h2>
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-body">
                            <div class="form-group row">
                                <label class="col-md-4 col-form-label font-weight-bold">Identificador:</label>
                                <div class="col-md-8">
                                    <p class="form-control-plaintext" th:text="${usuarioDescripcion.id}"></p>
                                </div>
                            </div>

                            <div class="form-group row">
                                <label class="col-md-4 col-form-label font-weight-bold">Email:</label>
                                <div class="col-md-8">
                                    <p class="form-control-plaintext" th:text="${usuarioDescripcion.email}"></p>
                                </div>
                            </div>

                            <div class="form-group row">
                                <label class="col-md-4 col-form-label font-weight-bold">Nombre:</label>
                                <div class="col-md-8">
                                    <p class="form-control-plaintext" th:text="${usuarioDescripcion.nombre}"></p>
                                </div>
                            </div>

                            <div class="form-group row">
                                <label class="col-md-4 col-form-label font-weight-bold">Fecha de Nacimiento:</label>
                                <div class="col-md-8">
                                    <p class="form-control-plaintext" th:text="${#dates.format(usuarioDescripcion.fechaNacimiento, 'dd-MM-yyyy')}"></p>
                                </div>
                            </div>

                            <div class="form-group row">
                                <label class="col-md-4 col-form-label font-weight-bold">Estado:</label>
                                <div class="col-md-8">
                                    <span th:if="${usuarioDescripcion.activo}" class="badge badge-success">Activo</span>
                                    <span th:if="not ${usuarioDescripcion.activo}" class="badge badge-danger">Inactivo</span>
                                </div>
                            </div>

                            <div class="form-group row">
                                <label class="col-md-4 col-form-label font-weight-bold">Administrador:</label>
                                <div class="col-md-8">
                                    <span th:if="${usuarioDescripcion.admin}" class="badge badge-primary">Sí</span>
                                    <span th:if="not ${usuarioDescripcion.admin}" class="badge badge-secondary">No</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-3">
                        <form th:action="@{/registered/{id}/toggle-activo(id=${usuarioDescripcion.id})}" method="POST" style="display:inline;">
                            <button class="btn btn-warning" type="submit" 
                                th:text="${usuarioDescripcion.activo} ? 'Desactivar Usuario' : 'Activar Usuario'">
                            </button>
                        </form>
                        <a class="btn btn-secondary" th:href="@{/registered}">Volver a Lista de Usuarios</a>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments::javascript}"></div>

    </body>
</html>
