<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:fragment="head (titulo)">
        <meta charset="UTF-8"/>
        <title th:text="${titulo}"></title>
        <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    </head>
    <body>
    <!-- Fragmento Barra Menú-->
        <nav th:fragment="menu(usuario)" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
            <div class="container-fluid w-75">
                <a class="navbar-brand" th:href="@{/about}">ToDoList</a>

                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mr-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/usuarios/{id}/tareas(id=${usuario?.id})}">Tareas</a>
                        </li>
                    </ul>

                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item" th:if="${usuario == null}">
                            <a class="nav-link" th:href="@{/login}">Iniciar sesión</a>
                        </li>
                        <li class="nav-item" th:if="${usuario == null}">
                            <a class="nav-link" th:href="@{/registro}">Crear cuenta</a>
                        </li>

                        <li class="nav-item dropdown" th:if="${usuario != null}">
                            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                <span th:text="${usuario.nombre}">Usuario</span>
                            </a>
                            <ul class="dropdown-menu" aria-labelledby="userDropdown">
                                <li><a class="dropdown-item" th:href="@{#}">Cuenta</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" th:href="@{/logout}">Cerrar Sesión</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    <!-- -------------------------------------------- -->
        <div th:fragment="javascript">
            <script th:src="@{/js/jquery.min.js}"></script>
            <script th:src="@{/js/popper.min.js}"></script>
            <script th:src="@{/js/bootstrap.min.js}"></script>
        </div>
    </body>
</html>
